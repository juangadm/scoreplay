<!DOCTYPE html>

  <link rel="stylesheet" href="../styles.css" />
  <style>
    /* Media page specific */
    .media-page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .advanced-search-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background-color: var(--chip-active);
      color: var(--text-primary);
      border-radius: 25px;
      font-size: 13px;
      font-weight: 500;
      transition: background-color 0.15s;
      flex-shrink: 0;
    }
    .advanced-search-btn:hover { background-color: var(--border-light); }

    .advanced-search-badge {
      background-color: var(--accent-pink-strong);
      color: white;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Date picker popup */
    .date-picker-popup {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      z-index: 1300;
    }
    .date-picker-popup.open { display: block; }

    .filter-chip-wrapper {
      position: relative;
    }

    .results-info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .results-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .pagination-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .page-info {
      font-size: 13px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .page-info strong {
      color: var(--text-primary);
    }
  </style>
</head>

<script>
  // Filter toggle
  const filterBtn = document.getElementById('filter-toggle-btn');
  const filterChips = document.getElementById('filter-chips');
  const filterBtnLabel = document.getElementById('filter-btn-label');
  let filtersVisible = true;

  filterBtn.addEventListener('click', () => {
    filtersVisible = !filtersVisible;
    filterChips.style.display = filtersVisible ? 'flex' : 'none';
    filterBtnLabel.textContent = filtersVisible ? 'Hide filters' : 'Filters';
  });

  // Date chip toggle
  const dateChip = document.getElementById('date-chip');
  const datePicker = document.getElementById('date-picker');
  dateChip.addEventListener('click', (e) => {
    e.stopPropagation();
    datePicker.classList.toggle('open');
  });

  // Close date picker on outside click
  document.addEventListener('click', (e) => {
    if (!dateChip.contains(e.target)) {
      datePicker.classList.remove('open');
    }
  });

  // Date preset selection
  document.querySelectorAll('.date-preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.style.backgroundColor = 'rgba(231, 0, 116, 0.15)';
      btn.style.color = 'rgb(243, 127, 185)';
      datePicker.classList.remove('open');
    });
  });

  // Sidebar sections
  document.querySelectorAll('.sidebar-section-btn').forEach(btn => {
    btn.addEventListener('click', () => btn.classList.toggle('open'));
  });

  // Active nav
  const path = window.location.pathname;
  document.querySelectorAll('.nav-link').forEach(link => {
    link.classList.remove('active');
    if (link.getAttribute('href') === path) link.classList.add('active');
  });
</script>
</body>
</html>
