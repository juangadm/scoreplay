<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScorePlay - sales demo</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    /* Collections page specific */
    .filter-chip-wrapper {
      position: relative;
    }

    .date-picker-popup {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      z-index: 1300;
    }
    .date-picker-popup.open { display: block; }
  </style>
</head>
<body>
<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-topbar">
      <div class="sidebar-logo">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="rgb(243, 127, 185)">
          <circle cx="12" cy="12" r="10"/>
        </svg>
        <span>sales demo</span>
      </div>
      <div class="sidebar-actions">
        <a href="/operations" class="sidebar-action-btn" title="Notifications">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2m6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5z"/>
          </svg>
        </a>
        <button class="sidebar-action-btn" title="Cart">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M15.55 13c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.37-.66-.11-1.48-.87-1.48H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.44C4.52 15.37 5.48 17 7 17h12v-2H7l1.1-2zM6.16 6h12.15l-2.76 5H8.53zM7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2m10 0c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2"/>
          </svg>
        </button>
        <button class="sidebar-action-btn" title="Profile" style="gap:4px;padding:0 4px;width:auto;">
          <div class="sidebar-avatar">JG</div>
          <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor">
            <path d="M7.41 8.59 12 13.17l4.59-4.58L18 10l-6 6-6-6z"/>
          </svg>
        </button>
      </div>
    </div>
    <nav>
      <ul class="sidebar-nav">
        <li><a href="/home" class="nav-link">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          Home
        </a></li>
        <li><a href="/upload" class="nav-link">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96M19 18H6c-2.21 0-4-1.79-4-4 0-2.05 1.53-3.76 3.56-3.97l1.07-.11.5-.95C8.08 7.14 9.94 6 12 6c2.62 0 4.88 1.86 5.39 4.43l.3 1.5 1.53.11C20.78 12.14 22 13.45 22 15c0 1.65-1.35 3-3 3"/></svg>
          Upload
        </a></li>
        <li><a href="/media" class="nav-link">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 6H0v5h.01L0 20c0 1.1.9 2 2 2h18v-2H2V6zm5 9h14l-3.5-4.5-2.5 3.01L11.5 9zM22 4h-8l-2-2H6c-1.1 0-1.99.9-1.99 2L4 16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 12H6V4h5.17l1.41 1.41.59.59H22v10z"/></svg>
          Media library
        </a></li>
        <li><a href="/collections" class="nav-link active">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2m-3 2v5l-1-.75L15 9V4zm3 12H8V4h5v9l3-2.25L19 13V4h1z"/></svg>
          Collections
        </a></li>
        <li><a href="/live" class="nav-link">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 10v8l7-4zm12-4h-7.58l3.29-3.29L16 2l-4 4h-.03l-4-4-.69.71L10.56 6H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2m0 14H3V8h18z"/></svg>
          Live
        </a></li>
        <li style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px;">
          <button class="sidebar-section-btn">Library<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.59 8.59 12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg></button>
        </li>
        <li><button class="sidebar-section-btn">Distribution<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.59 8.59 12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg></button></li>
        <li><button class="sidebar-section-btn">Configure<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.59 8.59 12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg></button></li>
        <li><button class="sidebar-section-btn">Analytics<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.59 8.59 12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg></button></li>
      </ul>
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- Search -->
    <div style="margin-bottom:16px;">
      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14"/>
        </svg>
        <input type="text" placeholder="Search by keyword, tag, player, team, season etc." />
      </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar-container">
      <div class="filter-bar-top">
        <button class="filter-toggle-btn" id="filter-toggle-btn">
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M10 18h4v-2h-4zM3 6v2h18V6zm3 7h12v-2H6z"/></svg>
          <span id="filter-btn-label">Hide filters</span>
        </button>
      </div>
      <div class="filter-chips" id="filter-chips">
        <div class="filter-chip-wrapper">
          <button class="filter-chip active" id="date-chip">
            Date
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.59 8.59 12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg>
          </button>
          <div class="date-picker-popup" id="date-picker">
            <div class="date-picker-dropdown">
              <div class="date-picker-presets">
                <button class="date-preset-btn">Today</button>
                <button class="date-preset-btn">Yesterday</button>
                <button class="date-preset-btn">This Week</button>
                <button class="date-preset-btn">Last Week</button>
                <button class="date-preset-btn">Last 7 Days</button>
                <button class="date-preset-btn">This Month</button>
                <button class="date-preset-btn">Last Month</button>
                <button class="date-preset-btn">This Year</button>
                <button class="date-preset-btn">Last Year</button>
              </div>
            </div>
          </div>
        </div>
        <button class="filter-chip active">Players <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.59 8.59 12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg></button>
        <button class="filter-chip disabled" disabled># of players <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.59 8.59 12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg></button>
        <button class="filter-chip active">Sponsors <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.59 8.59 12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg></button>
        <button class="filter-chip disabled" disabled>Sport <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.59 8.59 12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg></button>
        <button class="filter-chip disabled" disabled>Category <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.59 8.59 12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg></button>
        <button class="filter-chip active">Season <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.59 8.59 12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg></button>
        <button class="filter-chip active">Team <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.59 8.59 12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg></button>
        <button class="filter-chip disabled" disabled>Credits <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.59 8.59 12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg></button>
        <button class="filter-chip active">Format <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.59 8.59 12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg></button>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="collections-toolbar">
      <div class="collections-toolbar-left">
        <span class="collections-count">2 / 2 collections</span>
        <button class="btn-secondary" id="select-btn">Select</button>
      </div>
      <div class="collections-toolbar-right">

        <!-- Show empty collections toggle -->
        <div class="toggle-switch-wrapper">
          <span class="toggle-switch-label">Show empty collections</span>
          <label class="toggle-switch">
            <input type="checkbox" id="show-empty-toggle" />
            <span class="toggle-track"></span>
            <span class="toggle-thumb"></span>
          </label>
        </div>

        <!-- Show all media toggle -->
        <div class="toggle-switch-wrapper" title="Shows all media from all sub-collections">
          <span class="toggle-switch-label">Show all media</span>
          <label class="toggle-switch">
            <input type="checkbox" id="show-all-media-toggle" />
            <span class="toggle-track"></span>
            <span class="toggle-thumb"></span>
          </label>
        </div>

        <!-- View button -->
        <button class="btn-text" style="font-size:14px;font-weight:500;">
          View: All collections
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M16.59 8.59 12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg>
        </button>

        <!-- Sort button -->
        <button class="sort-btn">
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="m4 12 1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8z"/></svg>
          Sort: Collection date
        </button>

        <!-- List view toggle -->
        <button class="icon-btn" title="Switch to list view">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 7h6v2h-6zm0 4h6v2h-6zm0 4h6v2h-6zM7 7h2v2H7zm0 4h2v2H7zm0 4h2v2H7zM20.1 3H3.9c-.5 0-.9.4-.9.9v16.2c0 .4.4.9.9.9h16.2c.4 0 .9-.5.9-.9V3.9c0-.5-.5-.9-.9-.9M19 19H5V5h14z"/></svg>
        </button>

        <!-- More options -->
        <button class="icon-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2m0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2m0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2"/></svg>
        </button>
      </div>
    </div>

    <!-- Collections Grid -->
    <div class="collections-grid">

      <!-- Card 1: Testing -->
      <a href="/collections/815189" class="collection-card"
         style="background-image: url('https://scoreplay-mam-media-transformed.s3.amazonaws.com/986/3942801/media_90369703_89974573_compressed.png?x=44c1a5c16747a8');">
        <div class="card-actions">
          <button class="card-action-btn" title="Share" onclick="event.preventDefault()">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1M8 13h8v-2H8zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5"/></svg>
          </button>
          <button class="card-action-btn" title="Edit" onclick="event.preventDefault()">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="m14.06 9.02.92.92L5.92 19H5v-.92zM17.66 3c-.25 0-.51.1-.7.29l-1.83 1.83 3.75 3.75 1.83-1.83c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.2-.2-.45-.29-.71-.29m-3.6 3.19L3 17.25V21h3.75L17.81 9.94z"/></svg>
          </button>
        </div>
        <div></div>
        <div class="card-bottom">
          <div class="card-date">10/03/2026</div>
          <h6 class="card-title">Testing</h6>
        </div>
      </a>

      <!-- Card 2: San Antonio FC (2 media) -->
      <a href="/collections/409545" class="collection-card"
         style="background-image: url('https://scoreplay-mam-media-transformed.s3.amazonaws.com/986/1852092/media_52442653_52027654_compressed.jpg?x=8613b1ea462fa8');">
        <div class="card-actions">
          <button class="card-action-btn" title="Share" onclick="event.preventDefault()">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1M8 13h8v-2H8zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5"/></svg>
          </button>
          <button class="card-action-btn" title="Edit" onclick="event.preventDefault()">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="m14.06 9.02.92.92L5.92 19H5v-.92zM17.66 3c-.25 0-.51.1-.7.29l-1.83 1.83 3.75 3.75 1.83-1.83c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.2-.2-.45-.29-.71-.29m-3.6 3.19L3 17.25V21h3.75L17.81 9.94z"/></svg>
          </button>
        </div>
        <div class="card-top-row">
          <span class="card-media-count">2</span>
        </div>
        <div class="card-bottom">
          <div class="card-date">11/05/2025</div>
          <h6 class="card-title">San Antonio FC vs Oakland Roots SC (conference)</h6>
          <p class="card-subtitle">Oakland Roots SC (OAK)</p>
        </div>
      </a>

    </div><!-- /collections-grid -->

  </main>
</div>

<script>
  // Filter toggle
  const filterBtn = document.getElementById('filter-toggle-btn');
  const filterChips = document.getElementById('filter-chips');
  const filterBtnLabel = document.getElementById('filter-btn-label');
  let filtersVisible = true;

  filterBtn.addEventListener('click', () => {
    filtersVisible = !filtersVisible;
    filterChips.style.display = filtersVisible ? 'flex' : 'none';
    filterBtnLabel.textContent = filtersVisible ? 'Hide filters' : 'Filters';
  });

  // Date chip toggle
  const dateChip = document.getElementById('date-chip');
  const datePicker = document.getElementById('date-picker');
  dateChip.addEventListener('click', (e) => {
    e.stopPropagation();
    datePicker.classList.toggle('open');
  });
  document.addEventListener('click', (e) => {
    if (!dateChip.contains(e.target)) datePicker.classList.remove('open');
  });
  document.querySelectorAll('.date-preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.style.backgroundColor = 'rgba(231, 0, 116, 0.15)';
      btn.style.color = 'rgb(243, 127, 185)';
      datePicker.classList.remove('open');
    });
  });

  // Toggle switches
  document.querySelectorAll('.toggle-switch input').forEach(input => {
    input.addEventListener('change', function() {
      const track = this.parentElement.querySelector('.toggle-track');
      const thumb = this.parentElement.querySelector('.toggle-thumb');
      if (this.checked) {
        track.style.backgroundColor = 'rgb(231, 0, 116)';
        thumb.style.backgroundColor = 'rgb(255, 255, 255)';
      } else {
        track.style.backgroundColor = 'rgba(255, 255, 255, 0.38)';
        thumb.style.backgroundColor = 'rgb(224, 224, 224)';
      }
    });
  });

  // Select mode
  let selectMode = false;
  document.getElementById('select-btn').addEventListener('click', () => {
    selectMode = !selectMode;
    document.querySelectorAll('.collection-card').forEach(card => {
      if (selectMode) {
        card.style.outline = '2px solid rgba(243, 127, 185, 0.5)';
      } else {
        card.style.outline = 'none';
      }
    });
  });

  // Sidebar sections
  document.querySelectorAll('.sidebar-section-btn').forEach(btn => {
    btn.addEventListener('click', () => btn.classList.toggle('open'));
  });

  // Active nav
  const path = window.location.pathname;
  document.querySelectorAll('.nav-link').forEach(link => {
    link.classList.remove('active');
    if (link.getAttribute('href') === path) link.classList.add('active');
  });
</script>
</body>
</html>
